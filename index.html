<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Career Laboratory Resource Website</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#a01c2e;--primary-dark:#6b1219;--primary-light:#f5e8eb;
  --accent:#d4af37;--cream:#faf8f5;
  --success:#10b981;--danger:#ef4444;
  --text:#1a1a1a;--muted:#5a5a5a;--bg:#fefdfb;--card:#ffffff;--border:#e8e3de;
  --radius:16px;--radius-sm:10px;
  --shadow:0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
  --shadow-h:0 10px 30px rgba(160,28,46,.15), 0 0 0 1px rgba(0,0,0,.04);
  --t:.2s cubic-bezier(.4, 0, .2, 1);
  --font:'Inter','Segoe UI',system-ui,sans-serif;
  --font-h:'Georgia','DM Serif Display',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);color:var(--text);background:#faf8f5;font-size:16px;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{max-width:100%;display:block;border-radius:8px}
a{color:var(--primary);text-decoration:none;transition:color var(--t)}
a:hover{color:var(--primary-dark)}
main{flex:1}

h1,h2,h3,h4,h5,h6{font-family:var(--font-h);font-weight:700;line-height:1.2;color:var(--text);letter-spacing:-.02em}
h1{font-size:clamp(2rem,5vw,3.5rem);margin-bottom:16px}
h2{font-size:clamp(1.5rem,4vw,2.5rem);margin-bottom:12px}
h3{font-size:clamp(1.1rem,3vw,1.8rem);margin-bottom:10px}
h4{font-size:1.25rem;margin-bottom:8px}
p{margin-bottom:12px;color:#475569;line-height:1.75}

.container{max-width:1200px;margin:0 auto;padding:0 20px}
.section{padding:48px 0}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:32px}
@media(max-width:768px){
  .container{padding:0 16px}
  .section{padding:36px 0}
}
@media(max-width:640px){
  .container{padding:0 12px}
  .section{padding:24px 0}
  .grid-3{gap:16px;margin-top:20px}
}
.spotlight-wrap{position:relative;display:flex;align-items:center;gap:10px}
.spotlight-nav{width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.22);backdrop-filter:blur(6px);color:#fff;font-size:1.5rem;line-height:1;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--t);flex:0 0 auto;z-index:2}
.spotlight-nav:hover{background:rgba(255,255,255,.35);transform:translateY(-2px)}
.spotlight-track{display:flex;gap:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;scroll-padding:14vw;padding:8px max(12px,10vw) 26px;flex:1;scrollbar-width:none;mask-image:linear-gradient(to right, transparent 0, #000 10%, #000 90%, transparent 100%)}
@media(max-width:768px){
  .spotlight-track{gap:12px;padding:8px 8px 26px 8px;scroll-padding:50vw}
}
.spotlight-track::-webkit-scrollbar{display:none}
.spotlight-item{flex:0 0 min(420px,90vw);scroll-snap-align:center;opacity:.52;transform:scale(.9) translateY(10px);transition:transform .45s cubic-bezier(.2,.7,.2,1),opacity .45s cubic-bezier(.2,.7,.2,1);filter:saturate(.78)}
@media(max-width:768px){
  .spotlight-item{flex-basis:min(300px,85vw)}
}
@media(max-width:640px){
  .spotlight-item{flex-basis:100vw;transform:scale(.95) translateY(8px)}
  .spotlight-item.is-active{transform:scale(1) translateY(0);opacity:1}
}
.spotlight-item .card{height:100%;border-radius:22px;overflow:hidden}
.spotlight-item.is-active{opacity:1;transform:scale(1) translateY(0);filter:saturate(1)}
.spotlight-item.is-active .card{box-shadow:0 18px 50px rgba(0,0,0,.22),0 0 0 1px rgba(255,255,255,.2)}
.spotlight-light .spotlight-nav{border-color:rgba(160,28,46,.25);background:rgba(255,255,255,.92);color:var(--primary)}
.spotlight-light .spotlight-nav:hover{background:#fff}
.spotlight-light .spotlight-track{mask-image:linear-gradient(to right, transparent 0, #000 8%, #000 92%, transparent 100%)}
.spotlight-light .spotlight-item.is-active .card{box-shadow:0 18px 40px rgba(160,28,46,.16),0 0 0 1px rgba(160,28,46,.08)}
@media(max-width:860px){.spotlight-wrap{gap:6px}.spotlight-nav{width:38px;height:38px;font-size:1.2rem}.spotlight-track{padding-inline:max(6px,4vw)}.spotlight-item{flex-basis:min(340px,85vw)}}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.mt-2{margin-top:16px}.mt-3{margin-top:32px}.mt-4{margin-top:48px}.mb-2{margin-bottom:16px}.mb-3{margin-bottom:32px}.mb-4{margin-bottom:48px}
.hidden{display:none!important}

.site-header{background:rgba(255,253,251,.96);backdrop-filter:blur(20px);border-bottom:1px solid rgba(232,227,222,.7);position:sticky;top:0;z-index:999;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:18px 24px;height:100px;display:flex;align-items:center}
.nav-inner{display:flex;align-items:center;justify-content:space-between;gap:32px;max-width:1400px;margin:0 auto;flex:1;width:100%}
.nav-brand{color:var(--primary);font-family:var(--font-h);font-size:1.6rem;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:14px;user-select:none;letter-spacing:-.02em;position:relative;z-index:2;text-decoration:none}
.nav-brand img{height:72px;width:auto;border-radius:10px;box-shadow:0 8px 26px rgba(160,28,46,.12);object-fit:contain}
.nav-collapse{display:flex;align-items:center;justify-content:space-between;gap:24px;flex:1;min-width:0}
.nav-links{display:flex;gap:4px;list-style:none;background:transparent;padding:0;border-radius:0;position:relative;align-items:center;flex:1;overflow-x:auto;border:none;scroll-behavior:smooth}
.nav-links a{color:var(--muted);padding:8px 14px;border-radius:8px;font-size:.95rem;font-weight:500;letter-spacing:.01em;transition:all var(--t);cursor:pointer;border:none;position:relative;display:flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap;line-height:1}
.nav-links a svg{width:20px;height:20px;flex-shrink:0;transition:transform var(--t)}
.nav-links a:hover{color:var(--primary);background:rgba(160,28,46,.08)}
.nav-links a.active{color:var(--primary);font-weight:600;background:rgba(160,28,46,.12);box-shadow:inset 0 0 0 1px rgba(160,28,46,.2)}
.nav-user{color:var(--muted);display:flex;align-items:center;gap:12px;position:relative;z-index:2;flex-shrink:0}
.nav-account{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:12px;background:transparent;box-shadow:none;border:none;min-width:0;max-width:380px;cursor:pointer;transition:all var(--t)}
.nav-account:hover{background:rgba(232,227,222,.4)}
.nav-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#a01c2e,#c73546);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:.95rem;flex-shrink:0;font-family:var(--font)}
.nav-account-meta{display:flex;flex-direction:column;min-width:0;line-height:1;transition:all var(--t)}
.nav-account:hover .nav-account-meta{color:var(--primary)}
.nav-account-name{color:var(--text);font-size:.88rem;font-weight:600;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-account-role{color:var(--primary);font-size:.75rem;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;font-weight:700}
.nav-account-email{color:var(--muted);font-size:.75rem;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:none}
.nav-account-logout{height:36px;padding:0 12px;border-radius:8px;border:none;background:transparent;color:var(--text);font:inherit;font-size:.88rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:all var(--t);flex-shrink:0;margin-left:8px}
.nav-account-logout:hover{background:rgba(239,68,68,.1);color:var(--danger)}
.role-pill{background:var(--primary);color:#fff;padding:6px 12px;border-radius:6px;font-size:.75rem;font-weight:700;letter-spacing:.02em;line-height:1}
.hamburger{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:5px;padding:6px;position:relative;z-index:1001;-webkit-touch-callout:none;-webkit-user-select:none}
.hamburger span{display:block;width:24px;height:2.5px;background:#1a1a1a;border-radius:2px;transition:all var(--t)}
.hamburger:active span{background:#333}
@media(max-width:1024px){
  .nav-links{padding:0;gap:2px}
  .nav-links a{padding:8px 12px;font-size:.9rem}
  .nav-account-email{display:none}
  .site-header{height:86px;padding:12px 18px}
}
@media(max-width:768px){
  .hamburger{display:flex!important;margin-left:auto;order:3}
  .nav-inner{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px}
  .nav-brand{grid-column:1;font-size:1.1rem;min-width:0;overflow:hidden;text-overflow:ellipsis}
  .nav-brand img{height:40px;width:auto}
  .nav-user{display:none}
  .site-header{padding:10px 12px;height:auto;min-height:56px;overflow:visible}
  .nav-collapse{display:none;position:fixed;left:8px;right:8px;bottom:8px;top:auto;background:rgba(255,255,255,.98);padding:16px;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,.2);flex-direction:column;z-index:1000;overflow:hidden;border:1px solid rgba(232,227,222,.6);backdrop-filter:blur(20px);max-height:85vh}
  .nav-collapse.open{display:flex}
  .nav-links{flex-direction:column;flex-wrap:wrap;width:100%;background:transparent;box-shadow:none;padding:0;gap:6px;border-radius:0;justify-content:space-between;border:none;overflow-y:auto;max-height:calc(85vh - 160px)}
  .nav-links li{flex:1 1 100%;width:100%}
  .nav-links a{width:100%;border-radius:10px;background:rgba(255,253,251,.6);border:1px solid rgba(232,227,222,.6);justify-content:flex-start;padding:12px 14px;color:var(--text);font-size:.9rem;gap:10px}
  .nav-links a.active{background:rgba(160,28,46,.1);border-color:rgba(160,28,46,.2);color:var(--primary)}
  .nav-links a:hover{background:rgba(160,28,46,.08)}
  .nav-collapse .nav-user{display:flex;justify-content:space-between;align-items:center;gap:6px;min-width:0;width:100%;padding-top:12px;border-top:1px solid rgba(232,227,222,.5);margin-top:8px;flex-wrap:wrap}
  .nav-account{padding:8px;gap:8px;max-width:none;flex:1 1 auto;background:rgba(255,253,251,.6);border-radius:10px;border:1px solid rgba(232,227,222,.5);min-width:0;overflow:hidden}
  .nav-account-meta{display:flex;min-width:0;overflow:hidden}
  .nav-account-name{max-width:none;font-size:.8rem}
  .nav-account-email{display:block;max-width:150px;font-size:.75rem}
  .nav-account-logout{height:32px;padding:0 8px;font-size:.75rem;flex:0 0 auto;background:rgba(239,68,68,.1);color:var(--danger);margin-left:0;margin-top:8px;width:100%;justify-content:center}
}
@media(max-width:600px){
  .site-header{padding:8px 10px}
  .nav-brand{font-size:.95rem}
  .nav-brand img{height:36px}
  .nav-inner{gap:6px}
}

.hero{background:linear-gradient(112deg,rgba(40,8,14,.88) 5%,rgba(138,23,34,.66) 42%,rgba(17,6,8,.72) 100%),url("silveroaksx.jpg");background-size:cover,cover;background-position:center,center;background-repeat:no-repeat;color:#fff;padding:110px 24px;text-align:center;position:relative;overflow:hidden;margin-top:0;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:74vh;gap:24px;isolation:isolate}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='60' cy='60' r='52' fill='none' stroke='rgba(255,255,255,0.04)' stroke-width='1'/%3E%3Ccircle cx='60' cy='60' r='42' fill='none' stroke='rgba(255,255,255,0.03)' stroke-width='1'/%3E%3C/svg%3E") repeat;opacity:.32;pointer-events:none;z-index:0}
.hero::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 22% 18%, rgba(212,175,55,.18), transparent 38%),radial-gradient(circle at 80% 86%, rgba(160,28,46,.3), transparent 58%),linear-gradient(to top, rgba(0,0,0,.24), transparent 48%);pointer-events:none;z-index:1}
.hero-content{position:relative;z-index:2;max-width:920px;margin:0 auto;animation:heroContentIn .9s cubic-bezier(.2,.7,.2,1) both}
.hero-content > *{opacity:0;transform:translateY(20px);animation:heroItemIn .7s cubic-bezier(.2,.7,.2,1) forwards}
.hero-content > *:nth-child(1){animation-delay:.08s}
.hero-content > *:nth-child(2){animation-delay:.16s}
.hero-content > *:nth-child(3){animation-delay:.24s}
.hero-content > *:nth-child(4){animation-delay:.32s}
.hero-content > *:nth-child(5){animation-delay:.4s}
.hero-content > *:nth-child(6){animation-delay:.48s}
.hero h1{color:#fff;margin-bottom:8px;font-size:clamp(2.2rem,6vw,4rem);font-weight:700;letter-spacing:-.02em;line-height:1.2;font-family:var(--font-h);text-shadow:0 12px 30px rgba(0,0,0,.32)}
.hero-tagline{color:rgba(255,255,255,.95);font-size:clamp(.9rem,1.5vw,1.1rem);margin:0 auto 28px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-family:var(--font);font-style:italic}
.hero p{color:rgba(255,255,255,.88);font-size:clamp(1rem,2vw,1.2rem);max-width:700px;margin:0 auto 28px;font-weight:400;letter-spacing:.02em;line-height:1.6;text-shadow:0 8px 20px rgba(0,0,0,.24)}
.hero-cta{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:32px;z-index:2;position:relative}
.hero-img{display:none}
@keyframes heroContentIn{from{opacity:0;transform:translateY(18px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes heroItemIn{to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.hero{padding:60px 16px;min-height:55vh;gap:18px;background-position:center}.hero h1{font-size:1.6rem}.hero p{font-size:.95rem}.hero-cta{flex-direction:column;gap:10px;align-items:center;max-width:100%}}
@media(max-width:640px){.hero{padding:48px 14px;min-height:48vh;gap:14px;margin-top:-10px}.hero h1{font-size:1.5rem;margin-bottom:6px}.hero p{font-size:.9rem;margin:0 auto 16px}.hero-cta{gap:8px}}

.reveal-up{opacity:0;transform:translateY(26px);transition:opacity .65s cubic-bezier(.2,.7,.2,1),transform .65s cubic-bezier(.2,.7,.2,1)}
.reveal-up.in{opacity:1;transform:translateY(0)}

@media(prefers-reduced-motion:reduce){
  .hero-content,.hero-content > *{animation:none!important;opacity:1!important;transform:none!important}
  .reveal-up{opacity:1;transform:none;transition:none}
}

.card{background:#fff;border:1px solid rgba(232,227,222,.5);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;transition:all var(--t);cursor:pointer;animation:cardEntrance .4s ease-out}
@keyframes cardEntrance{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.card:hover{transform:translateY(-8px);box-shadow:var(--shadow-h);border-color:rgba(160,28,46,.15)}
.card-thumb{width:100%;height:200px;object-fit:cover;background:linear-gradient(135deg,#faf8f5,#f5e8eb);display:flex;align-items:center;justify-content:center}
.card-thumb-placeholder{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:3rem;background:linear-gradient(135deg,#faf8f5,#f5e8eb);color:rgba(160,28,46,.1)}
.card-body{padding:20px;flex:1;display:flex;flex-direction:column}
.card-title{font-size:1.1rem;margin-bottom:8px;color:var(--text);font-weight:700;line-height:1.4}
.card-desc{color:var(--muted);font-size:.95rem;flex:1;margin-bottom:16px;line-height:1.6}
.card-footer{margin-top:auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding-top:12px;border-top:1px solid rgba(232,227,222,.4)}
.card-meta{font-size:.85rem;color:var(--muted);font-weight:500}


.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:var(--radius-sm);border:none;cursor:pointer;font:inherit;font-size:.95rem;font-weight:600;text-decoration:none;transition:all var(--t);white-space:nowrap;letter-spacing:.02em;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.2);opacity:0;transition:opacity var(--t)}
.btn:hover::before{opacity:1}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,#a01c2e 0%,#6b1219 100%);color:#fff;box-shadow:0 8px 20px rgba(160,28,46,.25)}.btn-primary:hover{box-shadow:0 12px 30px rgba(160,28,46,.35);transform:translateY(-2px)}.btn-primary:active{transform:translateY(0) scale(.96)}
.btn-accent{background:linear-gradient(135deg,#1a1a1a 0%,#3a3a3a 100%);color:#fff;box-shadow:0 8px 20px rgba(26,26,26,.2)}.btn-accent:hover{box-shadow:0 12px 30px rgba(26,26,26,.3);transform:translateY(-2px)}
.btn-danger{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);color:#fff;box-shadow:0 8px 20px rgba(239,68,68,.25)}.btn-danger:hover{box-shadow:0 12px 30px rgba(239,68,68,.35);transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--primary);border:2px solid var(--primary);box-shadow:none}.btn-ghost:hover{background:rgba(160,28,46,.08);transform:translateY(-2px)}
.btn-sm{padding:8px 16px;font-size:.85rem}
.btn-lg{padding:16px 32px;font-size:1rem}

.badge{display:inline-block;padding:6px 12px;border-radius:6px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:rgba(160,28,46,.1);color:var(--primary)}
.badge-primary{background:rgba(160,28,46,.1);color:var(--primary)}
.badge-success{background:rgba(16,185,129,.1);color:var(--success)}
.badge-danger{background:rgba(239,68,68,.1);color:var(--danger)}

.tag-pill{display:inline-block;padding:6px 14px;border-radius:8px;border:1.5px solid rgba(232,227,222,.6);font-size:.85rem;cursor:pointer;color:var(--muted);transition:all var(--t);background:#fff}
.tag-pill:hover,.tag-pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.search-bar{display:flex;gap:8px;max-width:600px;width:100%}
.search-bar input{flex:1;padding:12px 16px;border:1.5px solid rgba(232,227,222,.6);border-radius:var(--radius-sm);font:inherit;font-size:.95rem;background:#fff;color:var(--text);transition:all var(--t);min-width:0}
.search-bar input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(160,28,46,.1)}
.search-bar input::placeholder{color:var(--muted)}
@media(max-width:768px){
  .search-bar{gap:6px}
  .search-bar input{padding:10px 12px;font-size:.9rem}
  .search-bar button{padding:10px 14px;font-size:.85rem;white-space:nowrap}
}
@media(max-width:640px){
  .search-bar{width:100%;flex-direction:column}
  .search-bar input{width:100%;padding:11px 14px}
  .search-bar button{width:100%;padding:11px 16px;font-size:.9rem}
}
.ac-wrap{position:relative;flex:1}
.ac-drop{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid rgba(232,227,222,.6);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);box-shadow:var(--shadow-h);z-index:200;max-height:300px;overflow-y:auto;display:none;backdrop-filter:blur(10px)}
.ac-drop.open{display:block}
.ac-item{padding:12px 14px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;gap:10px;transition:all var(--t);border-bottom:1px solid rgba(232,227,222,.3)}
.ac-item:hover{background:rgba(160,28,46,.08)}
.ac-item:last-child{border-bottom:none}
.ac-type{font-size:.7rem;background:var(--primary);color:#fff;padding:4px 8px;border-radius:4px;flex-shrink:0;font-weight:700;text-transform:uppercase}

.pagination{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:40px}
.page-btn{padding:10px 16px;border:1.5px solid rgba(232,227,222,.6);border-radius:var(--radius-sm);background:#fff;cursor:pointer;color:var(--muted);font-size:.9rem;transition:all var(--t);font-weight:600}
.page-btn:hover{background:rgba(160,28,46,.08);border-color:var(--primary);color:var(--primary)}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.form-group{margin-bottom:20px}
.form-label{display:block;font-weight:700;margin-bottom:8px;font-size:.9rem;color:var(--text)}
.form-label .req{color:var(--danger);margin-left:3px}

function _youtubeEmbed(url) {
  if (!url) return "";
  var m = url.match(/[?&]v=([^&]+)/);
  if (m) return "https://www.youtube.com/embed/" + m[1];
  m = url.match(/youtu\.be\/([^?]+)/);
  if (m) return "https://www.youtube.com/embed/" + m[1];
  m = url.match(/embed\/([^?]+)/);
  if (m) return "https://www.youtube.com/embed/" + m[1];
  return "";
}

function _pdfDownload(url) {
  if (!url) return "";
  var m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return "https://drive.google.com/uc?export=download&id=" + m[1];
  m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) return "https://drive.google.com/uc?export=download&id=" + m[1];
  return url;
}

function _withErrorContext(err, context) {
  var msg = err && err.message ? err.message : String(err || "Unknown error");
  return new Error(context ? (context + ": " + msg) : msg);
}

function _extractBucketPathFromUrl(url) {
  var raw = String(url || "").trim();
  if (!raw) return null;
  if (raw.indexOf("http") !== 0) return null;
  var marker = "/storage/v1/object/public/" + SUPABASE_STORAGE_BUCKET + "/";
  var idx = raw.indexOf(marker);
  if (idx === -1) return null;
  var part = raw.slice(idx + marker.length).split("?")[0].split("#")[0];
  try {
    part = decodeURIComponent(part);
  } catch (e) {}
  return part || null;
}

function _collectStoragePathsFromText(text) {
  var html = String(text || "");
  if (!html) return [];
  var rgx = /https?:\/\/[^"'\s<>]+/g;
  var found = html.match(rgx) || [];
  var paths = [];
  found.forEach(function(url) {
    var p = _extractBucketPathFromUrl(url);
    if (p) paths.push(p);
  });
  return paths;
}

function _unique(values) {
  var out = [];
  var seen = {};
  (values || []).forEach(function(v) {
    var key = String(v || "");
    if (!key || seen[key]) return;
    seen[key] = true;
    out.push(key);
  });
  return out;
}

function _collectAttachmentPaths(row, table) {
  if (!row) return [];
  var paths = [];
  [
    row.thumbnail_url,
    row.featured_image_url,
    row.pdf_link,
    row.youtube_url
  ].forEach(function(value) {
    var p = _extractBucketPathFromUrl(value);
    if (p) paths.push(p);
  });
  if (table === "courses" || table === "blogs" || table === "reference_materials" || table === "career_labs") {
    paths = paths.concat(_collectStoragePathsFromText(row.content));
  }
  return _unique(paths);
}

async function _deleteStoragePaths(db, paths) {
  var all = _unique(paths);
  if (!all.length) return;
  var bucket = db.storage.from(SUPABASE_STORAGE_BUCKET);
  var chunkSize = 100;
  for (var i = 0; i < all.length; i += chunkSize) {
    var chunk = all.slice(i, i + chunkSize);
    var result = await bucket.remove(chunk);
    if (result.error) throw _withErrorContext(result.error, "Failed to delete storage attachments");
  }
}

function _matchesText(value, q) {
  return String(value || "").toLowerCase().indexOf(String(q || "").toLowerCase()) !== -1;
}

function _filterCourses(rows, opts) {
  var search = String(opts.search || "").toLowerCase();
  var category = String(opts.category || "").toLowerCase();
  var grade = String(opts.grade || "").toLowerCase();
  return rows.filter(function (r) {
    if (search && !(_matchesText(r.Title, search) || _matchesText(r.Description, search) || _matchesText(r.Instructor, search) || _matchesText(r.Category, search) || _matchesText(r.Grade, search))) return false;
    if (category && String(r.Category || "").toLowerCase() !== category) return false;
    if (grade && String(r.Grade || "").toLowerCase() !== grade) return false;
    return true;
  });
}

function _filterPosts(rows, opts) {
  var search = String(opts.search || "").toLowerCase();

  return rows.filter(function (r) {
    if (search && !(_matchesText(r.Title, search) || _matchesText(r.Content, search) || _matchesText(r.Tags, search))) return false;
    if (tag && !String(r.Tags || "").toLowerCase().split(",").some(function(t){ return t.trim() === tag; })) return false;
    return true;
  });
}

function _filterReferences(rows, opts) {

function _filterCareerLabs(rows, opts) {

function verifyAndStart(token) {
  showLoader();
  (async function() {
    try {
      var cfg = _checkSupabaseConfig();
      if (!cfg.ok) throw new Error(cfg.message);
      var info = _decodeJwt(token);
      if (!info) throw new Error("Invalid sign-in token. Please sign in again.");
      var email = String(info.email || "").toLowerCase();
      if (!info.email_verified) throw new Error("Google account email is not verified.");
      if (!_isAllowedEmail(email)) throw new Error("Access denied: only @hyd.silveroaks.co.in accounts are allowed.");
      if (CLIENT_ID && CLIENT_ID !== "PUT_YOUR_OAUTH_CLIENT_ID" && info.aud !== CLIENT_ID) {
        throw new Error("Invalid sign-in audience. Please sign in again.");
      }
      var user = await _ensureUser(email, info.name || email.split("@")[0]);
      if (_normalizeStatus(user).toLowerCase() !== "active") {
        await _db().from("users")
          .update({ status: "Active" })
          .eq("email", email);
      }
      APP_USER = {
        email: email,
        name: user.Name || info.name || email.split("@")[0],
        role: user.Role || "Student",
        isAdmin: (user.Role || "Student") === "Admin" || (user.Role || "Student") === "Editor",
      };
      _idToken = token;
      hideLoader();
      showChrome();
      route("home");
      prewarmData();
    } catch (err) {
      hideLoader();
      _idToken = null;
      sessionStorage.removeItem("auth_id_token");
      APP_USER = null;
      renderLogin(err.message);
      if (window.google && google.accounts) {
        google.accounts.id.prompt();
      }
    }
  })();
}

var _cache   = {};
var CACHE_TTL = 45000;
var _pending  = {};
function _cacheGet(k){ var e = _cache[k]; return (e && Date.now() - e.ts < CACHE_TTL) ? e.data : null; }
function _cacheSet(k, d){ _cache[k] = { ts: Date.now(), data: d }; }
function _cacheInvalidate(){ _cache = {}; }

function _buildQuery(params) {
  return Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + "=" + encodeURIComponent(params[k] !== undefined ? params[k] : "");
  }).join("&");
}

function apiAsync(action, params) {
  var cacheKey = action + "|" + JSON.stringify(params || {});
  var cached = _cacheGet(cacheKey);
  if (cached) return Promise.resolve(cached);
  return _apiAsync(action, params || {}).then(function(data) {
    _cacheSet(cacheKey, data);
    return data;
  });
}

function api(action, params, onOk, onErr) {
  var cacheKey = action + "|" + JSON.stringify(params || {});
  var cached = _cacheGet(cacheKey);
  if (cached) {
    onOk(cached);
    return;
  }
  _npStart();
  _apiAsync(action, params || {})
    .then(function(data) {
      _npDone();
      _cacheSet(cacheKey, data);
      onOk(data);
    })
    .catch(function(e) { _npDone(); (onErr || defaultErr)(e); });
}

function apiPost(action, body, onOk, onErr) {
  showLoader();
  _apiPost(action, body || {})
    .then(function(data) {
      hideLoader();
      _cacheInvalidate();
      onOk(data);
    })
    .catch(function(e) { hideLoader(); (onErr || defaultErr)(e); });
}

async function _loadSearch(db, q, limit) {
  var query = String(q || "").toLowerCase();
  var max = Math.max(1, Number(limit) || 5);
  var courses = await _selectAll("courses", _toCourse);
  var posts = await _selectAll("blogs", _toPost);
  var references = await _selectAll("reference_materials", _toReference);
  var careerLabs = await _selectAll("career_labs", _toCareerLab);
  function match(row, fields) {
    return fields.some(function(field) { return _matchesText(row[field], query); });
  }
  return {
    courses: courses.filter(function(r){ return match(r, ["Title", "Description", "Instructor", "Category", "Grade"]); }).slice(0, max),
    posts: posts.filter(function(r){ return match(r, ["Title", "Content", "Tags"]); }).slice(0, max),
    references: references.filter(function(r){ return match(r, ["Title", "Description", "Author", "Category"]); }).slice(0, max),
    careerLabs: careerLabs.filter(function(r){ return match(r, ["Title", "Student", "Description", "Mentor", "Category"]); }).slice(0, max),
  };
}

async function _loadStats(db) {

  var careerLabs = await _selectAny("career_labs", _toCareerLab);

  var publishedCareerLabs = careerLabs.filter(function(r){ return r.Status === "Published"; });

  var recent = [];
  courses.forEach(function(c){ recent.push({ type:"Course", id:c.ID, title:c.Title, status:c.Status, date:c.CreatedDate }); });

async function _deleteById(db, table, id) {
  if (!id) throw new Error("Missing id");
  var current = await db.from(table).select("*").eq("id", id).maybeSingle();
  if (current.error) throw _withErrorContext(current.error, "Failed to load row before deletion");
  if (current.data) {
    var paths = _collectAttachmentPaths(current.data, table);
    await _deleteStoragePaths(db, paths);
  }
  var result = await db.from(table).delete().eq("id", id);
  if (result.error) throw _withErrorContext(result.error, "Failed to delete from " + table);
  return { ok: true };
}

async function _updateUserRole(db, email, role) {

  if (result.error) throw _withErrorContext(result.error, "Failed to update user role");
  return { ok: true };
}

async function _deleteUserCompletely(db, email) {
  var safeEmail = String(email || "").toLowerCase();
  if (!safeEmail) throw new Error("Missing user email");

  // Remove authored blog records first so any related attachments are cleaned up.
  var postsRes = await db.from("blogs").select("id").eq("author_email", safeEmail);
  if (postsRes.error) throw _withErrorContext(postsRes.error, "Failed to load user authored posts");
  var postIds = (postsRes.data || []).map(function(p) { return p.id; });
  for (var i = 0; i < postIds.length; i++) {
    await _deleteById(db, "blogs", postIds[i]);
  }

  var result = await db.from("users").delete().eq("email", safeEmail);
  if (result.error) throw _withErrorContext(result.error, "Failed to delete user");
  return { ok: true };
}

function initAC(inputId, dropId) {
  var inp = document.getElementById(inputId);

  if (!inp || !drop) return;
  var timer;
  inp.addEventListener("input", function() {
    clearTimeout(timer);
    var q = inp.value.trim();
    if (q.length < 2) { drop.classList.remove("open"); return; }
    timer = setTimeout(function() {
      api("search", {q: q}, function(res) {
        drop.innerHTML = "";
        var items = [];
        (res.courses    || []).forEach(function(c) { items.push({type:"Course",    label:c.Title,id:c.ID,page:"course"}); });
        (res.posts      || []).forEach(function(p) { items.push({type:"Blog",      label:p.Title,id:p.ID,page:"post"}); });
        (res.references || []).forEach(function(r) { items.push({type:"Reference", label:r.Title,id:r.ID,page:"reference"}); });
        (res.careerLabs || []).forEach(function(l) { items.push({type:"Career Lab", label:l.Title,id:l.ID,page:"career-lab-item"}); });

      }, function() { drop.classList.remove("open"); });

  });
}

var revealObserver = null;
function initRevealMotion(root) {
  var scope = root && root.querySelectorAll ? root : document;
  var nodes = scope.querySelectorAll(".reveal-up");
  if (!nodes.length) return;

  if (!("IntersectionObserver" in window)) {
    nodes.forEach(function(el) { el.classList.add("in"); });
    return;
  }

  if (!revealObserver) {
    revealObserver = new IntersectionObserver(function(entries, obs) {
      entries.forEach(function(entry) {
        if (!entry.isIntersecting) return;
        entry.target.classList.add("in");
        obs.unobserve(entry.target);
      });
    }, { threshold: .14, rootMargin: "0px 0px -48px 0px" });
  }

  nodes.forEach(function(el) {
    if (el.dataset.revealBound === "1") return;
    el.dataset.revealBound = "1";
    revealObserver.observe(el);
  });
}

function _closestSpotlightItem(track) {
  var items = Array.from(track.querySelectorAll(".spotlight-item"));
  if (!items.length) return null;
  var rect = track.getBoundingClientRect();
  var center = rect.left + rect.width / 2;
  var best = items[0];
  var dist = Infinity;
  items.forEach(function(item) {
    var r = item.getBoundingClientRect();
    var c = r.left + r.width / 2;
    var d = Math.abs(c - center);
    if (d < dist) { dist = d; best = item; }
  });
  return best;
}

function _paintSpotlightActive(track) {
  var items = Array.from(track.querySelectorAll(".spotlight-item"));
  if (!items.length) return;
  var active = _closestSpotlightItem(track);
  items.forEach(function(item) { item.classList.toggle("is-active", item === active); });
}

function initSpotlight(trackId) {
  var track = document.getElementById(trackId);
  if (!track) return;
  var kids = Array.from(track.children);
  if (!kids.length || kids[0].classList.contains("empty")) return;
  kids.forEach(function(child) {
    if (child.classList.contains("spotlight-item")) return;
    var wrap = document.createElement("div");
    wrap.className = "spotlight-item";
    child.replaceWith(wrap);
    wrap.appendChild(child);
  });
  _paintSpotlightActive(track);
  track.addEventListener("scroll", function() { _paintSpotlightActive(track); }, { passive: true });
}

function moveSpotlight(trackId, dir) {
  var track = document.getElementById(trackId);
  if (!track) return;
  var amount = Math.max(280, Math.round(track.clientWidth * 0.78));
  track.scrollBy({ left: dir * amount, behavior: "smooth" });
}

function fmt(cmd) {
  document.getElementById("f-content") && document.getElementById("f-content").focus();
  document.getElementById("p-content") && document.getElementById("p-content").focus();
  if      (cmd === "Bold")      document.execCommand("bold");
  else if (cmd === "Italic")    document.execCommand("italic");
  else if (cmd === "Underline") document.execCommand("underline");
  else if (cmd === "H2")        document.execCommand("formatBlock",false,"h2");
  else if (cmd === "H3")        document.execCommand("formatBlock",false,"h3");
  else if (cmd === "UL")        document.execCommand("insertUnorderedList");
  else if (cmd === "OL")        document.execCommand("insertOrderedList");
  else if (cmd === "Quote")     document.execCommand("formatBlock",false,"blockquote");
  else if (cmd === "Link") {
    var url = prompt("URL:");
    if (url) document.execCommand("createLink",false,url);
  }
}

function uploadFileToField(input, targetId, statusId, previewId, label) {
  var file = input.files && input.files[0];
  if (!file) return;
  var status = statusId ? document.getElementById(statusId) : null;
  var preview = previewId ? document.getElementById(previewId) : null;
  var target = document.getElementById(targetId);
  if (status) status.textContent = "Uploading…";
  var bucket = _db().storage.from(SUPABASE_STORAGE_BUCKET);
  var safeName = String(file.name || "file").replace(/[^a-zA-Z0-9._-]+/g, "_");
  var path = (label || "upload").toLowerCase().replace(/[^a-z0-9]+/g, "-") + "/" + Date.now() + "-" + safeName;
  bucket.upload(path, file, { upsert: true, contentType: file.type })
    .then(function(result) {
      if (result.error) throw result.error;
      return bucket.getPublicUrl(path);
    })
    .then(function(result) {
      var url = result.data && result.data.publicUrl;
      if (!url) throw new Error("Could not resolve public URL for uploaded file.");
      if (target) target.value = url;
      if (preview && file.type.indexOf("image/") === 0) {
        preview.src = url;
        preview.style.display = "block";
      }
      if (status) {
        status.textContent = (label || "File") + " uploaded";
        setTimeout(function(){ if (status) status.textContent = ""; }, 2600);
      }
    })
    .catch(function(err) {
      if (status) status.textContent = "Upload failed: " + (err.message || "unknown error");
    });
}

function renderPagination(key, total, offset, onPage) {
  var el = document.getElementById(key);
  if (!el || total <= PAGE_SIZE) { if (el) el.innerHTML = ""; return; }
  var pages = Math.ceil(total / PAGE_SIZE);
  var cur   = Math.floor(offset / PAGE_SIZE);
  var html  = "";
  if (cur > 0)       html += '<button class="page-btn" onclick="_pg(\''+key+'\','+(cur-1)+')">← Prev</button>';
  for (var i = 0; i < pages; i++) {
    html += '<button class="page-btn'+(i===cur?" active":"")+'" onclick="_pg(\''+key+'\','+i+')">'+(i+1)+'</button>';
  }
  if (cur < pages-1) html += '<button class="page-btn" onclick="_pg(\''+key+'\','+(cur+1)+')">Next →</button>';
  el.innerHTML = html;
  window["_pgcb_"+key] = onPage;
}
function _pg(key, idx) {
  var cb = window["_pgcb_"+key];
  if (cb) cb(idx * PAGE_SIZE);
}

var _sState = { q: "" };
function pageSearch(opts) {
  if (opts) _sState.q = (opts.q || "").trim();
  document.getElementById("app").innerHTML =
    '<div class="page-header"><div class="container"><h1>🔎 Search Everything</h1><p>Find results across courses, blog posts, references, and career labs.</p></div></div>' +
    '<section class="section"><div class="container">' +

    '<div class="ac-wrap"><input id="gs-srch" type="text" placeholder="Search all resources…" value="'+esc(_sState.q)+'" autocomplete="off"><div class="ac-drop" id="gs-ac"></div></div>' +
    '<button class="btn btn-primary" onclick="runGlobalSearch()">Search</button>' +
    (_sState.q ? '<button class="btn btn-ghost" onclick="route(\'search\',{q:\'\'})">Clear</button>' : '') +
    '</div>' +
    '<div id="gs-out"><div class="spinner"></div></div>' +
    '</div></section>';

  initAC("gs-srch", "gs-ac");
  var inp = document.getElementById("gs-srch");
  if (inp) inp.addEventListener("keydown", function(e) { if (e.key === "Enter") runGlobalSearch(); });

  if (!_sState.q) {
    document.getElementById("gs-out").innerHTML = '<div class="empty"><div class="empty-icon">🧭</div><p>Type keywords to search all sections.</p></div>';
    return;
  }

  apiAsync("search", { q: _sState.q, limit: 12 }).then(function(res) {
    var total = (res.courses||[]).length + (res.posts||[]).length + (res.references||[]).length + (res.careerLabs||[]).length;
    var html = '<p style="margin-bottom:24px;color:var(--muted)">Found '+total+' result'+(total===1?'':'s')+' for <strong>"'+esc(_sState.q)+'"</strong>.</p>';

    function block(title, icon, rows, page, cardFn) {
      if (!rows || !rows.length) return '';
      return '<div class="reveal-up" style="margin-bottom:38px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px">' +
        '<h2 style="margin:0;font-size:1.45rem">'+icon+' '+title+'</h2>' +
        '<button class="btn btn-ghost" onclick="route(\''+page+'\',{q:\''+esc(_sState.q)+'\'})">Open '+title+' →</button>' +
        '</div>' +
        '<div class="grid-3">'+rows.map(cardFn).join('')+'</div></div>';
    }

    html += block("Courses", "📚", res.courses, "courses", courseCard);
    html += block("Blog Posts", "✍️", res.posts, "blog", postCard);
    html += block("References", "📎", res.references, "references", referenceCard);
    html += block("Career Labs", "🧠", res.careerLabs, "career-lab", careerLabCard);

    if (total === 0) html += '<div class="empty"><div class="empty-icon">📭</div><p>No results found. Try a different keyword.</p></div>';
    document.getElementById("gs-out").innerHTML = html;
    initRevealMotion(document.getElementById("gs-out"));
  }).catch(defaultErr);
}

    '<button class="btn btn-primary" onclick="courseSearch()">Search</button>' +

    '<div class="pagination" id="c-pages"></div>' +
    '</div></section>';

  initAC("c-srch", "c-ac");

  apiAsync("courses", { search: _cState.q, category: _cState.category, grade: _cState.grade, offset: _cState.offset, limit: PAGE_SIZE }).then(function(result) {

    var grid = document.getElementById("c-grid");
    var cnt  = document.getElementById("c-count");
    var end  = Math.min(_cState.offset + PAGE_SIZE, result.total);
    if (cnt) cnt.textContent = "Showing "+(_cState.offset+1)+"–"+end+" of "+result.total+" courses"+(_cState.q?' matching "'+_cState.q+'"':"")+(_cState.category?" in "+_cState.category:"")+(_cState.grade?" · "+_cState.grade:"");

    if (grid) grid.innerHTML = (result.rows && result.rows.length)
      ? result.rows.map(courseCard).join("")
      : '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📭</div><p>No courses found. <a href="#" onclick="clearCourseFilter()">Reset</a></p></div>';

    renderPagination("c-pages", result.total, _cState.offset, function(off) { _cState.offset = off; pageCourses(); });

      var sel = document.getElementById("c-cat");
      if (sel && meta.categories) {

          opt.value = cat; opt.textContent = cat;
          if (_cState.category === cat) opt.selected = true;
          sel.appendChild(opt);

      }
    }).catch(function(){});
  }).catch(defaultErr);

function pageStaff() {
  document.getElementById("app").innerHTML =
    '<section class="staff-hero">' +
    '<div class="staff-shell">' +
    '<h1>Content Library</h1>' +
    '<p>Manage courses, posts, references, and Career Lab entries from one minimal workspace. Each content type stays separated as your archive grows.</p>' +
    '<div class="staff-kpis" id="stat-grid"><div class="spinner"></div></div>' +
    '</div></section>' +
    '<section class="section"><div class="staff-shell">' +
    '<div class="library-grid" id="staff-library"><div class="spinner"></div></div>' +
    '<div class="staff-users" id="users-table-wrap"><div class="spinner"></div></div>' +
    '</div></section>';

  Promise.all([
    apiAsync("stats", {}),
    apiAsync("allCourses", {}),
    apiAsync("allPosts", {}),
    apiAsync("allReferences", {}),
    apiAsync("allCareerLabs", {}),
    apiAsync("allUsers", {})
  ]).then(function(results) {
    var s = results[0];
    var courses = results[1];
    var posts = results[2];
    var refs = results[3];
    var labs = results[4];
    var users = results[5];

    document.getElementById("stat-grid").innerHTML = [
      {num:s.totalCourses, label:"Courses", published:s.publishedCourses},
      {num:s.totalBlogs, label:"Posts", published:s.publishedBlogs},
      {num:s.totalReferences, label:"References", published:s.publishedReferences},
      {num:s.totalCareerLabs, label:"Career Labs", published:s.publishedCareerLabs},
      {num:s.activeUsers, label:"Active Users", published:"—"}
    ].map(function(x) {
      return '<div class="kpi-card"><div class="kpi-value">' + esc(x.num) + '</div><div class="kpi-label">' + esc(x.label) + '</div>' +
        (x.published && x.published !== "—" ? '<div class="kpi-meta">' + esc(x.published) + ' published</div>' : '') +
        '</div>';
    }).join("");

    var libraries = [
      {
        icon: "📚",
        title: "Courses",
        action: "route('staff-course-form',{course:null})",
        items: courses,
        getTitle: function(item) { return item.Title; },
        getDesc: function(item) { return (item.Category ? item.Category + " • " : "") + (item.Grade ? "Grade " + item.Grade : ""); },
        getStatus: function(item) { return item.Status; },
        onEdit: function(item) { return "_editCourse('" + esc(item.ID) + "')"; },
        onDelete: function(item) { return "_delCourse('" + esc(item.ID) + "')"; }
      },
      {
        icon: "✍️",
        title: "Blog Posts",
        action: "route('staff-blog-form',{post:null})",
        items: posts,
        getTitle: function(item) { return item.Title; },
        getDesc: function(item) { return fmtDate(item.CreatedDate); },
        getStatus: function(item) { return item.Status; },
        onEdit: function(item) { return "_editPost('" + esc(item.ID) + "')"; },
        onDelete: function(item) { return "_delPost('" + esc(item.ID) + "')"; }
      },
      {
        icon: "📎",
        title: "References",
        action: "route('staff-reference-form',{ref:null})",
        items: refs,
        getTitle: function(item) { return item.Title; },
        getDesc: function(item) { return item.Category || "Uncategorized"; },
        getStatus: function(item) { return item.Status; },
        onEdit: function(item) { return "_editReference('" + esc(item.ID) + "')"; },
        onDelete: function(item) { return "_delReference('" + esc(item.ID) + "')"; }
      },
      {
        icon: "🧠",
        title: "Career Laboratory",
        action: "route('staff-careerlab-form',{lab:null})",
        items: labs,
        getTitle: function(item) { return item.Title; },
        getDesc: function(item) { return (item.Student ? item.Student + " • " : "") + (item.Mentor ? "Mentor: " + item.Mentor : ""); },
        getStatus: function(item) { return item.Status; },
        onEdit: function(item) { return "_editCareerLab('" + esc(item.ID) + "')"; },
        onDelete: function(item) { return "_delCareerLab('" + esc(item.ID) + "')"; }
      }
    ];

    var libraryHtml = '<div class="library-grid">' + libraries.map(function(lib) {
      var count = lib.items.length;
      var published = lib.items.filter(function(i) { return lib.getStatus(i) === "Published"; }).length;
      var itemsHtml = lib.items.length ? lib.items.map(function(item) {
        var status = lib.getStatus(item);
        return '<div class="library-item">' +
          '<div style="min-width:0;flex:1">' +
          '<div class="library-item-title">' + esc(lib.getTitle(item)) + '</div>' +
          '<div class="library-item-meta">' + esc(lib.getDesc(item)) + '</div>' +
          '</div>' +
          '<div class="library-actions">' +
          '<span class="status-chip ' + (status === "Published" ? 'is-published' : 'is-draft') + '">' + esc(status) + '</span>' +
          '<button class="btn btn-ghost btn-sm" onclick="' + lib.onEdit(item) + '">Edit</button>' +
          '<button class="btn btn-danger btn-sm" onclick="' + lib.onDelete(item) + '">Delete</button>' +
          '</div>' +
          '</div>';
      }).join("") : '<div class="empty-inline">No items yet</div>';

      return '<article class="library-card">' +
        '<div class="library-head">' +
        '<div><h3 class="library-title">' + esc(lib.icon) + ' ' + esc(lib.title) + '</h3><div class="library-sub">' + esc(count) + ' total • ' + esc(published) + ' published</div></div>' +
        '<button class="btn btn-primary btn-sm" onclick="' + lib.action + '">+ Add</button>' +
        '</div>' +
        '<div class="library-list">' + itemsHtml + '</div>' +
        '</article>';
    }).join("");

    var usersCard = '<div class="staff-users">' +
      '<div class="staff-users-head"><h3 class="library-title">👥 User Management</h3><div class="staff-users-note">Change roles for editors and students without leaving the portal. Admins keep full access.</div></div>';

    if (users && users.length) {
      var roles = ["Student","Editor","Admin"];
      usersCard += '<div class="staff-users-body"><div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead><tbody>' +
        users.map(function(u) {
          var isSelf = u.Email === APP_USER.email;
          var sel = '<select class="form-control" style="padding:5px 8px;font-size:.82rem;width:auto;border-radius:8px" id="role-'+esc(u.Email)+'">'+
            roles.map(function(r){ return '<option value="'+r+'"'+(u.Role===r?' selected':'')+'>'+r+'</option>'; }).join("") +
            '</select>';
          var deleteBtn = isSelf ? '' : '<button class="btn btn-danger btn-sm" onclick="_deleteUser(\''+esc(u.Email)+'\')">Delete</button>';
          return '<tr><td style="font-weight:500">'+esc(u.Name||"—")+'</td><td style="font-size:.82rem;color:var(--muted)">'+esc(u.Email)+'</td><td>'+sel+'</td>'+
                 '<td><div class="actions"><button class="btn btn-primary btn-sm" style="font-size:.75rem" onclick="_updateRole(\''+esc(u.Email)+'\')">Save</button>'+deleteBtn+'</div></td></tr>';
        }).join("") +
        '</tbody></table></div></div>';
    } else {
      usersCard += '<div class="staff-users-body"><div class="empty-inline">No users yet</div></div>';
    }
    usersCard += '</div>';

    document.getElementById("staff-library").innerHTML = libraryHtml;
    document.getElementById("users-table-wrap").innerHTML = usersCard;
  }).catch(defaultErr);
}

function buildAdminTable(rows, cols, cellsFn, actionsFn) {
  if (!rows || !rows.length) return '<div class="empty"><div class="empty-icon">📭</div><p>None yet.</p></div>';
  return '<div style="overflow-x:auto"><table class="data-table"><thead><tr>' +
    cols.map(function(c){ return '<th>'+esc(c)+'</th>'; }).join("") + '<th>Actions</th>' +
    '</tr></thead><tbody>' +
    rows.map(function(row) {
      return '<tr>'+cellsFn(row).map(function(v){ return '<td>'+v+'</td>'; }).join("")+
             '<td><div class="actions">'+actionsFn(row)+'</div></td></tr>';
    }).join("") +
    '</tbody></table></div>';
}

function drawBarChart(canvas, data) {
  var keys = Object.keys(data);
  if (!keys.length) { canvas.style.display="none"; return; }
  var ctx = canvas.getContext("2d");
  var W   = canvas.offsetWidth || 500;
  canvas.width = W; canvas.height = 120;
  var bW = (W - 40) / keys.length - 8;
  var max = Math.max.apply(null, keys.map(function(k){ return data[k]; }));
  var clrs = ["#1e3a5f","#2d6a9f","#f0b429","#2f855a","#c53030","#553c9a","#dd6b20"];
  keys.forEach(function(key, i) {
    var val = data[key];
    var bh  = Math.round((val / max) * 80);
    var x   = 20 + i * (bW + 8);
    var y   = 100 - bh;
    ctx.fillStyle = clrs[i % clrs.length];
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, bW, bh, 4); else ctx.rect(x, y, bW, bh);
    ctx.fill();
    ctx.fillStyle = "#1a202c"; ctx.font = "11px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(key.slice(0,10), x + bW/2, 115);
    ctx.fillStyle = "#fff";
    ctx.fillText(val, x + bW/2, y + 14);
  });
}
