<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Career Laboratory Resource Website</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#b61e34;--primary-dark:#821425;--primary-light:#fdecef;
  --gold:#c69a3a;--cream:#f6f1eb;
  --success:#0f8a5f;--danger:#d11f3b;
  --text:#16181d;--muted:#646b77;--bg:#f4f2ee;--card:#ffffff;--border:#e7e1da;
  --radius:12px;--radius-sm:8px;
  --shadow:0 10px 26px rgba(17,24,39,.06);
  --shadow-h:0 18px 40px rgba(182,30,52,.14);--t:.16s ease;
  --font:'Inter','Segoe UI',system-ui,sans-serif;
  --font-h:'DM Serif Display','Georgia',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);color:var(--text);background:
  radial-gradient(circle at top left, rgba(182,30,52,.11), transparent 32%),
  radial-gradient(circle at top right, rgba(198,154,58,.11), transparent 28%),
  linear-gradient(180deg,#fbfaf8 0%, #f4f2ee 100%);font-size:16px;line-height:1.65;min-height:100vh;display:flex;flex-direction:column}
img{max-width:100%;display:block}
a{color:var(--primary);text-decoration:none}
a:hover{color:var(--primary-dark);text-decoration:none}
main{flex:1}

h1,h2,h3,h4{font-family:var(--font-h);line-height:1.25;color:var(--text);letter-spacing:-.01em}
h1{font-size:clamp(1.7rem,4vw,2.6rem)}h2{font-size:clamp(1.3rem,3vw,2rem)}h3{font-size:clamp(1.05rem,2vw,1.4rem)}
p{margin-bottom:1rem}

.container{max-width:1100px;margin:0 auto;padding:0 20px}
.section{padding:48px 0}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.mt-2{margin-top:16px}.mt-3{margin-top:24px}.mb-2{margin-bottom:16px}.mb-3{margin-bottom:24px}
.hidden{display:none!important}

.site-header{background:rgba(255,255,255,.86);backdrop-filter:blur(18px);border-bottom:1px solid rgba(231,225,218,.92);position:sticky;top:0;z-index:999;box-shadow:0 8px 28px rgba(17,24,39,.06)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:0 20px;max-width:1100px;margin:0 auto;height:66px}
.nav-brand{color:var(--primary);font-family:var(--font-h);font-size:1.2rem;font-weight:400;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;letter-spacing:-.01em}
.nav-links{display:flex;gap:1px;list-style:none}
.nav-links a{color:var(--muted);padding:7px 15px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:500;letter-spacing:.02em;transition:var(--t);cursor:pointer}
.nav-links a:hover,.nav-links a.active{background:var(--primary-light);color:var(--primary);text-decoration:none}
.nav-user{color:var(--muted);font-size:.8rem;display:flex;align-items:center;gap:8px}
.user-badge{background:var(--primary);color:#fff;padding:2px 10px;border-radius:999px;font-size:.72rem;font-weight:600;letter-spacing:.04em}
.hamburger{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:5px;padding:4px}
.hamburger span{display:block;width:24px;height:2px;background:var(--text);border-radius:2px}
@media(max-width:768px){
  .hamburger{display:flex}
  .nav-collapse{display:none;position:absolute;top:66px;left:0;right:0;background:#fff;border-bottom:1px solid var(--border);padding:12px;flex-direction:column;box-shadow:0 12px 32px rgba(0,0,0,.1)}
  .nav-collapse.open{display:flex}
  .nav-links{flex-direction:column;width:100%}
  .nav-links a{padding:10px 16px;display:block;color:var(--text)}
  .nav-user{padding:10px 16px;color:var(--muted)}
}

.hero{background:linear-gradient(135deg,#851729 0%,#b61e34 44%,#de5e4e 100%);color:#fff;padding:56px 20px 40px;text-align:left;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='500' height='500' viewBox='0 0 500 500' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='390' cy='120' r='260' fill='rgba(255,255,255,0.05)'/%3E%3Ccircle cx='80' cy='410' r='220' fill='rgba(255,255,255,0.04)'/%3E%3C/svg%3E") no-repeat center/cover;pointer-events:none}
.hero h1{color:#fff;margin-bottom:12px;font-size:clamp(1.6rem,4vw,3rem);font-weight:400;letter-spacing:-.02em}
.hero h1::after{display:none}
.hero p{color:rgba(255,255,255,.82);font-size:1.05rem;max-width:620px;margin:0 0 28px;font-weight:400;letter-spacing:.01em}
.hero-img{width:100%;max-width:920px;margin:0 auto 40px;border-radius:24px;object-fit:cover;max-height:360px;box-shadow:0 28px 70px rgba(0,0,0,.32),0 0 0 1px rgba(255,255,255,.14);display:block}

.card{background:rgba(255,255,255,.92);border:1px solid rgba(231,225,218,.92);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;transition:transform var(--t),box-shadow var(--t),border-color var(--t)}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-h);border-color:rgba(182,30,52,.12)}
.card-thumb{width:100%;height:160px;object-fit:cover}
.card-thumb-placeholder{width:100%;height:160px;display:flex;align-items:center;justify-content:center;font-size:2.6rem;border-radius:calc(var(--radius) - 2px)}
.card-body{padding:14px;flex:1;display:flex;flex-direction:column}
.card-title{font-size:1rem;margin-bottom:6px;color:var(--text);font-family:var(--font-h)}
.card-desc{color:var(--muted);font-size:.84rem;flex:1;margin-bottom:12px}
.card-footer{margin-top:auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-meta{font-size:.78rem;color:var(--muted)}

.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font:inherit;font-size:.875rem;font-weight:600;text-decoration:none;transition:all var(--t);white-space:nowrap;letter-spacing:.01em}
.btn:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 10px 24px rgba(182,30,52,.22)}.btn-primary:hover{background:linear-gradient(135deg,var(--primary-dark),#5f0f1e);text-decoration:none;box-shadow:0 16px 30px rgba(182,30,52,.3)}
.btn-accent{background:var(--text);color:#fff}.btn-accent:hover{background:#000;text-decoration:none}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#9B0E25;text-decoration:none}
.btn-ghost{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}.btn-ghost:hover{background:var(--primary);color:#fff;text-decoration:none}
.btn-sm{padding:5px 11px;font-size:.78rem}
.btn-lg{padding:13px 26px;font-size:.98rem}

.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge-primary{background:var(--primary-light);color:var(--primary)}
.badge-success{background:#ECFDF3;color:var(--success)}

.tag-pill{display:inline-block;padding:4px 13px;border-radius:999px;border:1px solid var(--border);font-size:.78rem;cursor:pointer;color:var(--muted);transition:var(--t)}
.tag-pill:hover,.tag-pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.search-bar{display:flex;gap:8px;max-width:500px;width:100%}
.search-bar input{flex:1;padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);font:inherit;font-size:.95rem;background:#fff;color:var(--text)}
.search-bar input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(196,18,48,.08)}
.ac-wrap{position:relative;flex:1}
.ac-drop{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);box-shadow:var(--shadow);z-index:200;max-height:260px;overflow-y:auto;display:none}
.ac-drop.open{display:block}
.ac-item{padding:9px 13px;cursor:pointer;font-size:.88rem;display:flex;align-items:center;gap:8px}
.ac-item:hover{background:var(--primary-light)}
.ac-type{font-size:.68rem;background:var(--primary);color:#fff;padding:2px 6px;border-radius:3px;flex-shrink:0}

.pagination{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:32px}
.page-btn{padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;cursor:pointer;color:var(--muted);font-size:.88rem;transition:var(--t)}
.page-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.form-group{margin-bottom:16px}
.form-label{display:block;font-weight:600;margin-bottom:5px;font-size:.88rem}
.form-label .req{color:var(--danger);margin-left:3px}
.form-control{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font:inherit;font-size:.93rem;background:#fff;color:var(--text);transition:border-color var(--t)}
.form-control:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(196,18,48,.08)}
textarea.form-control{min-height:110px;resize:vertical}
.form-hint{font-size:.78rem;color:var(--muted);margin-top:3px}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px}

.toolbar{display:flex;flex-wrap:wrap;gap:3px;padding:7px;background:#FAF9F8;border:1px solid var(--border);border-bottom:none;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.toolbar button{padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--muted);cursor:pointer;font-size:.82rem}
.toolbar button:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.editor{width:100%;min-height:180px;border:1px solid var(--border);border-radius:0 0 var(--radius-sm) var(--radius-sm);padding:11px;font:inherit;font-size:.93rem;line-height:1.6;background:#fff;color:var(--text)}
.editor:focus{outline:none;border-color:var(--primary)}

.video-wrap{position:relative;padding-top:56.25%;border-radius:var(--radius);overflow:hidden;background:#000}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.pdf-box{display:flex;align-items:center;gap:15px;padding:18px;background:var(--primary-light);border:1px solid rgba(196,18,48,.15);border-radius:var(--radius)}
.pdf-icon{font-size:2.2rem}
.rich-content{line-height:1.85}
.rich-content h1,.rich-content h2,.rich-content h3{margin:22px 0 9px}
.rich-content ul,.rich-content ol{padding-left:22px;margin-bottom:14px}
.rich-content blockquote{border-left:3px solid var(--primary);padding:11px 16px;background:var(--primary-light);border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin:14px 0;color:var(--muted)}

.page-header{background:linear-gradient(135deg,#16181d 0%,#2b2f39 60%,#3b2025 100%);color:#fff;padding:48px 20px;position:relative;overflow:hidden}
.page-header::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 20%, rgba(198,154,58,.18), transparent 24%), radial-gradient(circle at 20% 80%, rgba(182,30,52,.18), transparent 28%);pointer-events:none}
.page-header h1{color:#fff;margin-bottom:6px;font-weight:400}.page-header h1::after{display:none}.page-header p{color:rgba(255,255,255,.72);margin:0}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:rgba(255,255,255,.9);border:1px solid rgba(231,225,218,.92);border-radius:var(--radius);padding:22px;text-align:center;box-shadow:var(--shadow)}
.stat-num{font-size:2.2rem;font-weight:700;color:var(--primary)}
.stat-label{color:var(--muted);font-size:.78rem;margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.data-table{width:100%;border-collapse:collapse;font-size:.875rem}
.data-table th{background:var(--cream);text-align:left;padding:10px 14px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);font-size:.78rem;text-transform:uppercase;letter-spacing:.06em}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tr:hover td{background:var(--primary-light)}
.actions{display:flex;gap:5px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius)}

.alert{padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:14px;font-size:.88rem;display:flex;align-items:flex-start;gap:9px}
.alert-danger{background:var(--primary-light);border:1px solid rgba(196,18,48,.2);color:var(--primary)}
.alert-info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1D4ED8}

#toast-box{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:9px}
.toast{padding:12px 18px;border-radius:var(--radius-sm);color:#fff;font-size:.88rem;box-shadow:var(--shadow-h);animation:slideIn .3s ease;max-width:300px}
.toast-ok{background:var(--success)}.toast-err{background:var(--danger)}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}

.spinner{width:34px;height:34px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:22px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9998;align-items:center;justify-content:center}
.loader-overlay.show{display:flex}
.loader-box{background:#fff;padding:26px 34px;border-radius:12px;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow)}

.panel{max-width:440px;margin:70px auto;padding:40px;background:rgba(255,255,255,.92);border:1px solid rgba(231,225,218,.92);border-radius:var(--radius);box-shadow:var(--shadow-h);text-align:center}
.panel-icon{font-size:3.2rem;margin-bottom:14px}

.empty{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-icon{font-size:3.2rem;margin-bottom:14px}

.post-meta{display:flex;flex-wrap:wrap;gap:12px;color:var(--muted);font-size:.83rem;margin:9px 0 22px}
.featured-img{width:100%;max-height:300px;object-fit:cover;border-radius:var(--radius);margin-bottom:24px}
.filter-bar{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:22px}

.site-footer{background:linear-gradient(135deg,#16181d,#2b2f39 50%,#3b2025);color:rgba(255,255,255,.75);padding:36px 20px;text-align:center;font-size:.82rem;margin-top:auto}
.site-footer strong{color:#fff}
#nprogress{height:3px;background:var(--primary);position:fixed;top:0;left:0;z-index:99999;transition:width .25s ease,opacity .3s ease;width:0;opacity:1}

@media(max-width:640px){.section{padding:30px 0}.hero{padding:48px 16px}.hero h1{font-size:1.6rem}.panel{margin:36px 16px;padding:26px 18px}.actions{flex-wrap:wrap}#toast-box{right:12px;left:12px;bottom:12px}.toast{max-width:100%}}
</style>
</head>

<script>

var SUPABASE_URL   = "https://wicihqhrjgcikcyurbtd.supabase.co";
var SUPABASE_ANON_KEY = "sb_publishable_ZgwGLXUMusAEhv1ghHdRGg_cnzDn4Of";
var SUPABASE_STORAGE_BUCKET = "career-lab-uploads";

var CLIENT_ID = "392344488331-qt8b726lvhbldl9bptpj58bagj8qq2af.apps.googleusercontent.com";
  
var APP_NAME  = "Career Laboratory Resource Website";
var PAGE_SIZE = 9;

var _idToken = sessionStorage.getItem("auth_id_token") || null;
var APP_USER = null;   
var SUPABASE = null;

function _initSupabase() {
  if (SUPABASE) return SUPABASE;
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY || SUPABASE_URL.indexOf("PUT_YOUR_SUPABASE_URL_HERE") !== -1 || SUPABASE_ANON_KEY.indexOf("PUT_YOUR_SUPABASE_ANON_KEY_HERE") !== -1) {
    throw new Error("Set SUPABASE_URL and SUPABASE_ANON_KEY in index.html before using the app.");
  }
  if (!window.supabase || !window.supabase.createClient) {
    throw new Error("Supabase client library failed to load.");
  }
  SUPABASE = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: false, autoRefreshToken: false },
  });
  return SUPABASE;
}

function _checkSupabaseConfig() {
  if (!SUPABASE_URL || SUPABASE_URL.indexOf("PUT_YOUR_SUPABASE_URL_HERE") !== -1) {
    return { ok: false, message: "Missing SUPABASE_URL." };
  }
  if (!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.indexOf("PUT_YOUR_SUPABASE_ANON_KEY_HERE") !== -1) {
    return { ok: false, message: "Missing SUPABASE_ANON_KEY." };
  }
  return { ok: true };
}

function _db() {
  return _initSupabase();
}

function _decodeJwt(token) {
  try {
    var payload = token.split('.')[1] || "";
    while (payload.length % 4) payload += "=";
    payload = payload.replace(/-/g, "+").replace(/_/g, "/");
    return JSON.parse(atob(payload));
  } catch (e) {
    return null;
  }
}

function _nowIso() {
  return new Date().toISOString();
}

function _uuid() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'id-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function _isAllowedEmail(email) {
  return String(email || "").toLowerCase().endsWith("@hyd.silveroaks.co.in");
}

function _youtubeEmbed(url) {
  if (!url) return "";
  var m = url.match(/[?&]v=([^&]+)/);
  if (m) return "https://www.youtube.com/embed/" + m[1];
  m = url.match(/youtu\.be\/([^?]+)/);
  if (m) return "https://www.youtube.com/embed/" + m[1];
  m = url.match(/embed\/([^?]+)/);
  if (m) return "https://www.youtube.com/embed/" + m[1];
  return "";
}

function _pdfDownload(url) {
  if (!url) return "";
  var m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return "https://drive.google.com/uc?export=download&id=" + m[1];
  m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) return "https://drive.google.com/uc?export=download&id=" + m[1];
  return url;
}

function _withErrorContext(err, context) {
  var msg = err && err.message ? err.message : String(err || "Unknown error");
  return new Error(context ? (context + ": " + msg) : msg);
}

async function _selectAll(table, mapper) {
  var query = _db().from(table).select("*");
  if (table !== "users") query = query.eq("status", "Published");
  var result = await query.order(table === "users" ? "created_date" : "created_date", { ascending: false });
  if (result.error) throw _withErrorContext(result.error, "Failed to load " + table);
  return (result.data || []).map(mapper || function(r){ return r; });
}

async function _selectAny(table, mapper) {

}

async function _selectById(table, id, mapper) {
  var result = await _db().from(table).select("*").eq("id", id).maybeSingle();
  if (result.error) throw _withErrorContext(result.error, "Failed to load " + table + " row");
  return result.data ? (mapper ? mapper(result.data) : result.data) : null;
}

async function _ensureUser(email, name) {
  var db = _db();

  if (current.data) return _toUser(current.data);
  var inserted = await db.from("users").upsert([_userRowToDb({ email: email, name: name, role: "Student", status: "Active" })], { onConflict: "email" }).select("*").single();
  if (inserted.error) throw _withErrorContext(inserted.error, "Failed to create user");

}

function _pageRows(rows, offset, limit) {
  var start = Number(offset) || 0;
  var size = Number(limit) || PAGE_SIZE;
  return { total: rows.length, rows: rows.slice(start, start + size) };
}

function _matchesText(value, q) {
  return String(value || "").toLowerCase().indexOf(String(q || "").toLowerCase()) !== -1;
}

function _filterCourses(rows, opts) {
  var search = String(opts.search || "").toLowerCase();
  var category = String(opts.category || "").toLowerCase();
  var grade = String(opts.grade || "").toLowerCase();
  return rows.filter(function (r) {
    if (search && !(_matchesText(r.Title, search) || _matchesText(r.Description, search) || _matchesText(r.Instructor, search) || _matchesText(r.Category, search) || _matchesText(r.Grade, search))) return false;
    if (category && String(r.Category || "").toLowerCase() !== category) return false;
    if (grade && String(r.Grade || "").toLowerCase() !== grade) return false;
    return true;
  });
}

function _filterPosts(rows, opts) {
  var search = String(opts.search || "").toLowerCase();
  var tag = String(opts.tag || "").toLowerCase();
  return rows.filter(function (r) {
    if (search && !(_matchesText(r.Title, search) || _matchesText(r.Content, search) || _matchesText(r.Tags, search))) return false;
    if (tag && !String(r.Tags || "").toLowerCase().split(",").some(function(t){ return t.trim() === tag; })) return false;
    return true;
  });
}

function _filterReferences(rows, opts) {
  var search = String(opts.search || "").toLowerCase();
  var category = String(opts.category || "").toLowerCase();
  return rows.filter(function (r) {
    if (search && !(_matchesText(r.Title, search) || _matchesText(r.Description, search) || _matchesText(r.Author, search) || _matchesText(r.Category, search))) return false;
    if (category && String(r.Category || "").toLowerCase() !== category) return false;
    return true;
  });
}

function _filterCareerLabs(rows, opts) {
  var search = String(opts.search || "").toLowerCase();
  var category = String(opts.category || "").toLowerCase();
  var student = String(opts.student || "").toLowerCase();
  return rows.filter(function (r) {
    if (search && !(_matchesText(r.Title, search) || _matchesText(r.Student, search) || _matchesText(r.Description, search) || _matchesText(r.Mentor, search) || _matchesText(r.Category, search))) return false;
    if (category && String(r.Category || "").toLowerCase() !== category) return false;
    if (student && String(r.Student || "").toLowerCase().indexOf(student) === -1) return false;
    return true;
  });
}

function verifyAndStart(token) {
  showLoader();
  (async function() {
    try {
      var cfg = _checkSupabaseConfig();
      if (!cfg.ok) throw new Error(cfg.message);
      var info = _decodeJwt(token);
      if (!info) throw new Error("Invalid sign-in token. Please sign in again.");
      var email = String(info.email || "").toLowerCase();
      if (!info.email_verified) throw new Error("Google account email is not verified.");
      if (!_isAllowedEmail(email)) throw new Error("Access denied: only @hyd.silveroaks.co.in accounts are allowed.");
      if (CLIENT_ID && CLIENT_ID !== "PUT_YOUR_OAUTH_CLIENT_ID" && info.aud !== CLIENT_ID) {
        throw new Error("Invalid sign-in audience. Please sign in again.");
      }
      var user = await _ensureUser(email, info.name || email.split("@")[0]);
      if (_normalizeStatus(user).toLowerCase() !== "active") {
        await _db().from("users")
          .update({ status: "Active" })
          .eq("email", email);
      }
      APP_USER = {
        email: email,
        name: user.Name || info.name || email.split("@")[0],
        role: user.Role || "Student",
        isAdmin: (user.Role || "Student") === "Admin" || (user.Role || "Student") === "Editor",
      };
      _idToken = token;
      hideLoader();
      showChrome();
      route("home");
      prewarmData();
    } catch (err) {
      hideLoader();
      _idToken = null;
      sessionStorage.removeItem("auth_id_token");
      APP_USER = null;
      renderLogin(err.message);
      if (window.google && google.accounts) {
        google.accounts.id.prompt();
      }
    }
  })();
}

var _npEl;
function _npStart() {

}
function _npDone() {
  if (!_npEl) return;

var _cache   = {};
var CACHE_TTL = 45000;
var _pending  = {};
function _cacheGet(k){ var e = _cache[k]; return (e && Date.now() - e.ts < CACHE_TTL) ? e.data : null; }
function _cacheSet(k, d){ _cache[k] = { ts: Date.now(), data: d }; }
function _cacheInvalidate(){ _cache = {}; }

function _buildQuery(params) {
  return Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + "=" + encodeURIComponent(params[k] !== undefined ? params[k] : "");
  }).join("&");
}

function apiAsync(action, params) {
  var cacheKey = action + "|" + JSON.stringify(params || {});
  var cached = _cacheGet(cacheKey);
  if (cached) return Promise.resolve(cached);
  return _apiAsync(action, params || {}).then(function(data) {
    _cacheSet(cacheKey, data);
    return data;
  });
}

function api(action, params, onOk, onErr) {
  var cacheKey = action + "|" + JSON.stringify(params || {});
  var cached = _cacheGet(cacheKey);
  if (cached) {
    onOk(cached);
    return;
  }
  _npStart();
  _apiAsync(action, params || {})
    .then(function(data) {
      _npDone();
      _cacheSet(cacheKey, data);
      onOk(data);
    })
    .catch(function(e) { _npDone(); (onErr || defaultErr)(e); });
}

function apiPost(action, body, onOk, onErr) {
  showLoader();
  _apiPost(action, body || {})
    .then(function(data) {
      hideLoader();
      _cacheInvalidate();
      onOk(data);
    })
    .catch(function(e) { hideLoader(); (onErr || defaultErr)(e); });
}

  var publishedReferences = references.filter(function(r){ return r.Status === "Published"; });
  var publishedCareerLabs = careerLabs.filter(function(r){ return r.Status === "Published"; });
  var activeUsers = users.filter(function(r){ return r.Status === "Active"; });
  var recent = [];
  courses.forEach(function(c){ recent.push({ type:"Course", id:c.ID, title:c.Title, status:c.Status, date:c.CreatedDate }); });
  blogs.forEach(function(b){ recent.push({ type:"Blog", id:b.ID, title:b.Title, status:b.Status, date:b.CreatedDate }); });
  references.forEach(function(r){ recent.push({ type:"Reference", id:r.ID, title:r.Title, status:r.Status, date:r.CreatedDate }); });
  careerLabs.forEach(function(l){ recent.push({ type:"Career Lab", id:l.ID, title:l.Title, status:l.Status, date:l.CreatedDate }); });
  recent.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
  var catMap = {};
  courses.forEach(function(c) { var cat = c.Category || "Uncategorized"; catMap[cat] = (catMap[cat] || 0) + 1; });
  var gradeMap = {};
  courses.forEach(function(c) { var g = c.Grade || "Unassigned"; gradeMap[g] = (gradeMap[g] || 0) + 1; });
  return {
    totalCourses: courses.length,
    totalBlogs: blogs.length,
    totalReferences: references.length,
    totalCareerLabs: careerLabs.length,
    publishedCourses: publishedCourses.length,
    publishedBlogs: publishedBlogs.length,
    publishedReferences: publishedReferences.length,
    publishedCareerLabs: publishedCareerLabs.length,
    activeUsers: activeUsers.length,
    recentActivity: recent.slice(0, 10),
    categoryData: catMap,
    gradeData: gradeMap,
  };
}

async function _saveCourse(db, payload) {
  var existing = payload.id ? await _selectById("courses", payload.id) : null;

function initAC(inputId, dropId) {
  var inp = document.getElementById(inputId);
  var drop = document.getElementById(dropId);
  if (!inp || !drop) return;
  var timer;
  inp.addEventListener("input", function() {
    clearTimeout(timer);
    var q = inp.value.trim();
    if (q.length < 2) { drop.classList.remove("open"); return; }
    timer = setTimeout(function() {
      api("search", {q: q}, function(res) {
        drop.innerHTML = "";
        var items = [];
        (res.courses    || []).forEach(function(c) { items.push({type:"Course",    label:c.Title,id:c.ID,page:"course"}); });
        (res.posts      || []).forEach(function(p) { items.push({type:"Blog",      label:p.Title,id:p.ID,page:"post"}); });
        (res.references || []).forEach(function(r) { items.push({type:"Reference", label:r.Title,id:r.ID,page:"reference"}); });
        (res.careerLabs || []).forEach(function(l) { items.push({type:"Career Lab", label:l.Title,id:l.ID,page:"career-lab-item"}); });
        if (!items.length) {
          drop.innerHTML = "<div class='ac-item' style='color:#999'>No results</div>";
        } else {
          items.forEach(function(item) {
            var div = document.createElement("div");
            div.className = "ac-item";
            div.innerHTML = "<span class='ac-type'>"+esc(item.type)+"</span><span>"+esc(item.label)+"</span>";
            div.onclick = function() { route(item.page, {id: item.id}); drop.classList.remove("open"); };
            drop.appendChild(div);
          });
        }
        drop.classList.add("open");
      }, function() { drop.classList.remove("open"); });
    }, 280);
  });
  document.addEventListener("click", function(e) {
    if (!inp.contains(e.target) && !drop.contains(e.target)) drop.classList.remove("open");
  });
}

function fmt(cmd) {
  document.getElementById("f-content") && document.getElementById("f-content").focus();
  document.getElementById("p-content") && document.getElementById("p-content").focus();
  if      (cmd === "Bold")      document.execCommand("bold");
  else if (cmd === "Italic")    document.execCommand("italic");
  else if (cmd === "Underline") document.execCommand("underline");
  else if (cmd === "H2")        document.execCommand("formatBlock",false,"h2");
  else if (cmd === "H3")        document.execCommand("formatBlock",false,"h3");
  else if (cmd === "UL")        document.execCommand("insertUnorderedList");
  else if (cmd === "OL")        document.execCommand("insertOrderedList");
  else if (cmd === "Quote")     document.execCommand("formatBlock",false,"blockquote");
  else if (cmd === "Link") {
    var url = prompt("URL:");
    if (url) document.execCommand("createLink",false,url);
  }
}

function uploadFileToField(input, targetId, statusId, previewId, label) {
  var file = input.files && input.files[0];
  if (!file) return;
  var status = statusId ? document.getElementById(statusId) : null;
  var preview = previewId ? document.getElementById(previewId) : null;
  var target = document.getElementById(targetId);
  if (status) status.textContent = "Uploading…";
  var bucket = _db().storage.from(SUPABASE_STORAGE_BUCKET);
  var safeName = String(file.name || "file").replace(/[^a-zA-Z0-9._-]+/g, "_");
  var path = (label || "upload").toLowerCase().replace(/[^a-z0-9]+/g, "-") + "/" + Date.now() + "-" + safeName;
  bucket.upload(path, file, { upsert: true, contentType: file.type })
    .then(function(result) {
      if (result.error) throw result.error;
      return bucket.getPublicUrl(path);
    })
    .then(function(result) {
      var url = result.data && result.data.publicUrl;
      if (!url) throw new Error("Could not resolve public URL for uploaded file.");
      if (target) target.value = url;
      if (preview && file.type.indexOf("image/") === 0) {
        preview.src = url;
        preview.style.display = "block";
      }
      if (status) {
        status.textContent = (label || "File") + " uploaded";
        setTimeout(function(){ if (status) status.textContent = ""; }, 2600);
      }
    })
    .catch(function(err) {
      if (status) status.textContent = "Upload failed: " + (err.message || "unknown error");
    });
}

function renderPagination(key, total, offset, onPage) {
  var el = document.getElementById(key);
  if (!el || total <= PAGE_SIZE) { if (el) el.innerHTML = ""; return; }
  var pages = Math.ceil(total / PAGE_SIZE);
  var cur   = Math.floor(offset / PAGE_SIZE);
  var html  = "";
  if (cur > 0)       html += '<button class="page-btn" onclick="_pg(\''+key+'\','+(cur-1)+')">← Prev</button>';
  for (var i = 0; i < pages; i++) {
    html += '<button class="page-btn'+(i===cur?" active":"")+'" onclick="_pg(\''+key+'\','+i+')">'+(i+1)+'</button>';
  }
  if (cur < pages-1) html += '<button class="page-btn" onclick="_pg(\''+key+'\','+(cur+1)+')">Next →</button>';
  el.innerHTML = html;
  window["_pgcb_"+key] = onPage;
}
function _pg(key, idx) {
  var cb = window["_pgcb_"+key];
  if (cb) cb(idx * PAGE_SIZE);
}

function buildAdminTable(rows, cols, cellsFn, actionsFn) {
  if (!rows || !rows.length) return '<div class="empty"><div class="empty-icon">📭</div><p>None yet.</p></div>';
  return '<div style="overflow-x:auto"><table class="data-table"><thead><tr>' +
    cols.map(function(c){ return '<th>'+esc(c)+'</th>'; }).join("") + '<th>Actions</th>' +
    '</tr></thead><tbody>' +
    rows.map(function(row) {
      return '<tr>'+cellsFn(row).map(function(v){ return '<td>'+v+'</td>'; }).join("")+
             '<td><div class="actions">'+actionsFn(row)+'</div></td></tr>';
    }).join("") +
    '</tbody></table></div>';
}

function drawBarChart(canvas, data) {
  var keys = Object.keys(data);
  if (!keys.length) { canvas.style.display="none"; return; }
  var ctx = canvas.getContext("2d");
  var W   = canvas.offsetWidth || 500;
  canvas.width = W; canvas.height = 120;
  var bW = (W - 40) / keys.length - 8;
  var max = Math.max.apply(null, keys.map(function(k){ return data[k]; }));
  var clrs = ["#1e3a5f","#2d6a9f","#f0b429","#2f855a","#c53030","#553c9a","#dd6b20"];
  keys.forEach(function(key, i) {
    var val = data[key];
    var bh  = Math.round((val / max) * 80);
    var x   = 20 + i * (bW + 8);
    var y   = 100 - bh;
    ctx.fillStyle = clrs[i % clrs.length];
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, bW, bh, 4); else ctx.rect(x, y, bW, bh);
    ctx.fill();
    ctx.fillStyle = "#1a202c"; ctx.font = "11px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(key.slice(0,10), x + bW/2, 115);
    ctx.fillStyle = "#fff";
    ctx.fillText(val, x + bW/2, y + 14);
  });
}

function submitCareerLab() {
  var idEl = document.getElementById("lab-id");
  var payload = {
    id:           idEl ? idEl.value : "",
    title:        (document.getElementById("lab-title")  ||{}).value || "",
    student:      (document.getElementById("lab-student")||{}).value || "",
    description:  (document.getElementById("lab-desc")   ||{}).value || "",
    mentor:       (document.getElementById("lab-mentor") ||{}).value || "",
    category:     (document.getElementById("lab-cat")    ||{}).value || "",
    thumbnailUrl: (document.getElementById("lab-thumb")  ||{}).value || "",
    youtubeUrl:   (document.getElementById("lab-yt")     ||{}).value || "",
    pdfLink:      (document.getElementById("lab-pdf")    ||{}).value || "",
    content:      (document.getElementById("lab-content")||{}).innerHTML || "",
    status:       (document.getElementById("lab-status") ||{}).value || "Draft",
  };
  if (!payload.title.trim())   { toast("Title is required.", "err"); return; }
  if (!payload.student.trim()) { toast("Student name is required.", "err"); return; }
  apiPost("saveCareerLab", {data: payload}, function() { toast("Career Lab saved! 🎉"); route("staff"); });
}

function submitPost() {
  var idEl = document.getElementById("p-id");
  var payload = {
    id:              idEl ? idEl.value : "",
    title:           (document.getElementById("p-title")  ||{}).value || "",
    featuredImageUrl:(document.getElementById("p-img")    ||{}).value || "",
    pdfLink:         (document.getElementById("p-pdf")    ||{}).value || "",
    tags:            (document.getElementById("p-tags")   ||{}).value || "",
    content:         (document.getElementById("p-content")||{}).innerHTML || "",
    status:          (document.getElementById("p-status") ||{}).value || "Draft",
  };
  if (!payload.title.trim())   { toast("Title is required.", "err"); return; }
  if (!stripHtml(payload.content||"")) { toast("Content is required.", "err"); return; }
  apiPost("savePost", {data: payload}, function() { toast("Post saved! 🎉"); route("staff"); });
}
